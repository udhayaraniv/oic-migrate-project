name: Promote OIC3 projects via Oracle GitHub integration

on:
  workflow_dispatch:
    inputs:
      project_ids:
        description: "Comma-separated Oracle Integration project identifiers"
        required: true
      project_label:
        description: "Optional deployment label/version"
        required: false
        default: ""

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate source and target configuration
        run: |
          test -n "${{ secrets.SRC_TOKEN_URL }}"
          test -n "${{ secrets.SRC_CLIENT_ID }}"
          test -n "${{ secrets.SRC_CLIENT_SECRET }}"
          test -n "${{ secrets.SRC_SCOPE }}"
          test -n "${{ secrets.SRC_OIC_BASE_URL }}"
          test -n "${{ secrets.SRC_OIC_INSTANCE }}"

          test -n "${{ secrets.TGT_TOKEN_URL }}"
          test -n "${{ secrets.TGT_CLIENT_ID }}"
          test -n "${{ secrets.TGT_CLIENT_SECRET }}"
          test -n "${{ secrets.TGT_SCOPE }}"
          test -n "${{ secrets.TGT_OIC_BASE_URL }}"
          test -n "${{ secrets.TGT_OIC_INSTANCE }}"

          test -n "${{ github.event.inputs.project_ids }}"

      - name: Get source access token
        id: src_token
        run: |
          TOKEN=$(bash scripts/get_token.sh \
            "${{ secrets.SRC_TOKEN_URL }}" \
            "${{ secrets.SRC_CLIENT_ID }}" \
            "${{ secrets.SRC_CLIENT_SECRET }}" \
            "${{ secrets.SRC_SCOPE }}")
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Get target access token
        id: tgt_token
        run: |
          TOKEN=$(bash scripts/get_token.sh \
            "${{ secrets.TGT_TOKEN_URL }}" \
            "${{ secrets.TGT_CLIENT_ID }}" \
            "${{ secrets.TGT_CLIENT_SECRET }}" \
            "${{ secrets.TGT_SCOPE }}")
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Promote all projects
        run: |
          PROJECT_IDS="${{ github.event.inputs.project_ids }}"
          PROJECT_LABEL="${{ github.event.inputs.project_label }}"

          IFS=',' read -ra PROJECT_ARRAY <<< "$PROJECT_IDS"

          for RAW_PROJECT_ID in "${PROJECT_ARRAY[@]}"; do
            PROJECT_ID="$(echo "$RAW_PROJECT_ID" | xargs)"

            if [ -z "$PROJECT_ID" ]; then
              continue
            fi

            echo "========================================"
            echo "Processing project: $PROJECT_ID"
            echo "========================================"

            echo "Exporting project from source to GitHub repository..."
            bash scripts/export_project_to_github.sh \
              "${{ secrets.SRC_OIC_BASE_URL }}" \
              "${{ secrets.SRC_OIC_INSTANCE }}" \
              "${{ steps.src_token.outputs.token }}" \
              "$PROJECT_ID" \
              "$PROJECT_LABEL"

            echo "Fetching repository project metadata from target..."
            RESPONSE=$(bash scripts/list_git_projects.sh \
              "${{ secrets.TGT_OIC_BASE_URL }}" \
              "${{ secrets.TGT_OIC_INSTANCE }}" \
              "${{ steps.tgt_token.outputs.token }}")

            echo "$RESPONSE" > gitprojects.json

            DOWNLOAD_URL=$(jq -r --arg pid "$PROJECT_ID" '
              .items[]
              | select(
                  .id == ($pid + ".car")
                  or .path == ("projects/" + $pid + ".car")
                  or .path == ("deployments/" + $pid + ".car")
                  or (.id | startswith($pid))
                  or (.path | contains($pid))
                )
              | .download_url
            ' gitprojects.json | head -n 1)

            if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
              echo "Could not find download URL for project: $PROJECT_ID"
              cat gitprojects.json
              exit 1
            fi

            echo "Found download URL for $PROJECT_ID: $DOWNLOAD_URL"

            echo "Importing project into target..."
            bash scripts/import_project_from_github.sh \
              "${{ secrets.TGT_OIC_BASE_URL }}" \
              "${{ secrets.TGT_OIC_INSTANCE }}" \
              "${{ steps.tgt_token.outputs.token }}" \
              "$PROJECT_ID" \
              "$DOWNLOAD_URL" \
              "$PROJECT_LABEL"

            echo "Completed project: $PROJECT_ID"
          done
